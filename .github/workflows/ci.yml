name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Quality Checks and Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # The tests load the 46 MB ONNX model from models/. Without this
          # flag, the checkout gets the LFS pointer file and ORT fails with
          # "protobuf parsing failed".
          lfs: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Formatter check
        run: bun run fmt

      - name: Linting check
        run: bun run lint --format=github

      - name: TypeScript type check
        run: bun run type-check

      # The 46 MB ONNX model is committed in models/, so tests run real
      # inference without any download step.
      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # Verify the build is reproducible: build a second time and confirm the
      # output is byte-identical (OpenSSF Best Practices: build_reproducible).
      - name: Verify reproducible build
        run: |
          h1=$(find lib -type f -exec shasum {} \; | sort | shasum)
          rm -rf lib
          bun run build
          h2=$(find lib -type f -exec shasum {} \; | sort | shasum)
          if [ "$h1" != "$h2" ]; then
            echo "::error::Build is not reproducible: $h1 != $h2"
            exit 1
          fi
          echo "Build is reproducible."

  sca:
    name: SCA (dependency vulnerabilities)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=./bun.lock
